# Application
spring.application.name=sahty-emr
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sahty_global
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Vaadin
vaadin.launch-browser=true
vaadin.allowed-packages=com.vaadin,org.vaadin,dev.hilla,com.sahty

# Security
sahty.jwt.secret=sahty-emr-super-secret-key-must-be-at-least-256-bits-long-for-hs256
sahty.jwt.expiration=86400000

# MinIO
minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=sahty-docs

# ICD-11 API
icd.api.url=http://localhost:8085

# Logging
logging.level.com.sahty=DEBUG
logging.level.org.springframework.security=INFO

# Multipart
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Session
server.servlet.session.timeout=8h
